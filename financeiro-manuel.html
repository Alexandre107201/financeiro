let currentView = 'add';
let currentType = 'saida';
let selectedCat = '';
let selectedSub = '';
let filterMonth = '';
let expandedSumCat = null;
let expandedConfigCat = null;
let pendingDelete = null;
let pendingRename = null;

// STORAGE
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

function init() {
  entries = load('fm_entries', []);
  categories = load('fm_categories', null);
  if (!categories || Object.keys(categories).length === 0) categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('input-date').value = today;
  filterMonth = today.slice(0,7);

  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const d = new Date();
  document.getElementById('header-date').textContent = days[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()];

  selectedCat = Object.keys(categories)[0] || '';
  selectedSub = categories[selectedCat]?.[0] || '';

  renderCatChips();
  renderSubChips();
  updateExportBtn();
}

// VIEW SWITCHING
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  if (v === 'list') renderList();
  if (v === 'summary') renderSummary();
  if (v === 'config') renderConfig();
}

// TYPE
function setType(t) {
  currentType = t;
  document.getElementById('btn-saida').className = 'type-btn saida' + (t==='saida'?' active':'');
  document.getElementById('btn-entrada').className = 'type-btn entrada' + (t==='entrada'?' active':'');
}

// FORMAT
function fmtBRL(v) { return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function getMonthKey(d) { return d.slice(0,7); }

// CAT CHIPS
function renderCatChips() {
  const search = document.getElementById('input-cat-search').value.toLowerCase();
  const cats = Object.keys(categories).filter(c => c.toLowerCase().includes(search));
  const el = document.getElementById('cat-chips');
  el.innerHTML = cats.map(c =>
    `<button class="chip${c===selectedCat?' active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')">` + c + `</button>`
  ).join('');
}

function selectCat(cat) {
  selectedCat = cat;
  selectedSub = categories[cat]?.[0] || '';
  document.getElementById('input-cat-search').value = '';
  renderCatChips();
  renderSubChips();
}

function renderSubChips() {
  const subs = categories[selectedCat] || [];
  const sec = document.getElementById('sub-section');
  if (subs.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('sub-chips').innerHTML = subs.map(s =>
    `<button class="sub-chip${s===selectedSub?' active':''}" onclick="selectSub('${s.replace(/'/g,"\\'")}')">` + s + `</button>`
  ).join('');
}

function selectSub(sub) {
  selectedSub = sub;
  renderSubChips();
}

// ADD ENTRY
function addEntry() {
  const raw = document.getElementById('input-value').value.replace(',','.');
  if (!raw || isNaN(Number(raw))) return;
  const entry = {
    id: Date.now(),
    date: document.getElementById('input-date').value,
    type: currentType,
    category: selectedCat,
    subcategory: selectedSub,
    value: parseFloat(raw),
    note: document.getElementById('input-note').value
  };
  entries.unshift(entry);
  save('fm_entries', entries);
  document.getElementById('input-value').value = '';
  document.getElementById('input-note').value = '';
  const btn = document.getElementById('register-btn');
  btn.textContent = '✓ Salvo!';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Registrar'; btn.classList.remove('saved'); }, 1800);
  updateExportBtn();
}

// MONTHS HELPER
function getAllMonths() {
  const set = new Set(entries.map(e => getMonthKey(e.date)));
  const arr = [...set].sort().reverse();
  if (!arr.includes(filterMonth)) arr.unshift(filterMonth);
  return arr;
}

function renderMonthFilter(containerId) {
  const months = getAllMonths();
  document.getElementById(containerId).innerHTML = months.map(m => {
    const [y, mo] = m.split('-');
    return `<button class="month-btn${m===filterMonth?' active':''}" onclick="setFilterMonth('${m}')">${MONTHS[parseInt(mo)-1]}/${y.slice(2)}</button>`;
  }).join('');
}

function setFilterMonth(m) {
  filterMonth = m;
  if (currentView === 'list') renderList();
  if (currentView === 'summary') renderSummary();
}

// LIST VIEW
function renderList() {
  renderMonthFilter('list-months');
  const me = entries.filter(e => getMonthKey(e.date) === filterMonth);
  const el = document.getElementById('list-entries');
  if (me.length === 0) { el.innerHTML = '<div class="empty">Nenhum lançamento neste mês</div>'; return; }
  el.innerHTML = me.map(e => `
    <div class="entry-card ${e.type}">
      <div style="flex:1">
        <div class="entry-meta">
          <span class="entry-date">${e.date.slice(5).replace('-','/')}</span>
          <span class="entry-sub">${e.subcategory}</span>
        </div>
        <div class="entry-cat">${e.category}</div>
        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
      </div>
      <div style="text-align:right;margin-left:12px">
        <div class="entry-value ${e.type}">${e.type==='entrada'?'+':'-'}${fmtBRL(e.value)}</div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">excluir</button>
      </div>
    </div>
  `).join('');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save('fm_entries', entries);
  renderList();
  updateExportBtn();
}

// SUMMARY VIEW
function renderSummary() {
  renderMonthFilter('summary-months');
  const me = entries.filter(e => getMonthKey(e.date) === filterMonth);
  const totalIn = me.filter(e=>e.type==='entrada').reduce((s,e)=>s+e.value,0);
  const totalOut = me.filter(e=>e.type==='saida').reduce((s,e)=>s+e.value,0);
  const bal = totalIn - totalOut;
  document.getElementById('sum-in').textContent = fmtBRL(totalIn);
  document.getElementById('sum-out').textContent = fmtBRL(totalOut);
  const balEl = document.getElementById('sum-bal');
  balEl.textContent = fmtBRL(Math.abs(bal));
  balEl.style.color = bal >= 0 ? '#F5C542' : '#FF4757';

  const byCat = {};
  for (const e of me) {
    if (!byCat[e.category]) byCat[e.category] = { total: 0, subs: {}, count: 0 };
    byCat[e.category].total += e.type==='saida' ? -e.value : e.value;
    byCat[e.category].count++;
    if (!byCat[e.category].subs[e.subcategory]) byCat[e.category].subs[e.subcategory] = 0;
    byCat[e.category].subs[e.subcategory] += e.type==='saida' ? -e.value : e.value;
  }

  const el = document.getElementById('summary-cats');
  if (Object.keys(byCat).length === 0) { el.innerHTML = '<div class="empty">Nenhum lançamento neste mês</div>'; return; }

  const sorted = Object.entries(byCat).sort((a,b)=>a[1].total-b[1].total);
  el.innerHTML = sorted.map(([cat, data]) => {
    const isOpen = expandedSumCat === cat;
    const subRows = isOpen ? Object.entries(data.subs).map(([sub,val]) =>
      `<div class="sub-row">
        <span style="font-size:12px;color:#666">${sub}</span>
        <span style="font-size:12px;font-family:'Syne',sans-serif;font-weight:700;color:${val>=0?'#2ED573':'#FF6B6B'}">${val>=0?'+':''}${fmtBRL(val)}</span>
      </div>`
    ).join('') : '';
    return `
      <div class="cat-wrap">
        <div class="cat-row ${isOpen?'open':'closed'}" onclick="toggleSumCat('${cat.replace(/'/g,"\\'")}')">
          <div>
            <div style="font-size:13px;color:#2A2A2A">${cat}</div>
            <div style="font-size:10px;color:#444;margin-top:2px">${data.count} lançamentos</div>
          </div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:${data.total>=0?'#2ED573':'#FF6B6B'}">${data.total>=0?'+':''}${fmtBRL(data.total)}</div>
        </div>
        ${isOpen ? `<div class="cat-detail">${subRows}</div>` : ''}
      </div>`;
  }).join('');
}

function toggleSumCat(cat) {
  expandedSumCat = expandedSumCat === cat ? null : cat;
  renderSummary();
}

// CONFIG VIEW
function renderConfig() {
  document.getElementById('export-btn').textContent = `⬇ Exportar CSV (${entries.length} lançamentos)`;
  const el = document.getElementById('config-cats');
  el.innerHTML = Object.entries(categories).map(([cat, subs]) => {
    const isOpen = expandedConfigCat === cat;
    const subRows = isOpen ? subs.map(sub => `
      <div class="config-sub-row">
        <span class="config-sub-name">${sub}</span>
        <div class="sub-action-btns">
          <button class="sub-icon-btn" onclick="openRenameSub('${cat.replace(/'/g,"\\'")}','${sub.replace(/'/g,"\\'")}')">✎</button>
          <button class="sub-del-btn" onclick="openDeleteSub('${cat.replace(/'/g,"\\'")}','${sub.replace(/'/g,"\\'")}')">✕</button>
        </div>
      </div>`).join('') : '';
    const addSubRow = isOpen ? `
      <div class="add-sub-row">
        <input class="add-sub-input" type="text" placeholder="Nova subcategoria..." id="sub-input-${encodeURIComponent(cat)}" onkeydown="if(event.key==='Enter')addSub('${cat.replace(/'/g,"\\'")}')">
        <button class="add-sub-btn" onclick="addSub('${cat.replace(/'/g,"\\'")}')">+</button>
      </div>` : '';
    return `
      <div class="cat-wrap">
        <div class="config-cat-header ${isOpen?'open':'closed'}">
          <div style="flex:1;cursor:pointer" onclick="toggleConfigCat('${cat.replace(/'/g,"\\'")}')">
            <div class="config-cat-name">${cat}</div>
            <div class="config-cat-sub-count">${subs.length} subcategorias</div>
          </div>
          <div class="config-cat-btns">
            <button class="icon-btn" onclick="openRenameCat('${cat.replace(/'/g,"\\'")}')">✎</button>
            <button class="icon-btn-del" onclick="openDeleteCat('${cat.replace(/'/g,"\\'")}')">✕</button>
          </div>
        </div>
        ${isOpen ? `<div class="config-sub-detail">${subRows}${addSubRow}</div>` : ''}
      </div>`;
  }).join('');
}

function toggleConfigCat(cat) {
  expandedConfigCat = expandedConfigCat === cat ? null : cat;
  renderConfig();
}

// ADD CATEGORY
function addCategory() {
  const name = document.getElementById('new-cat-input').value.trim();
  if (!name || categories[name]) return;
  categories[name] = [];
  save('fm_categories', categories);
  document.getElementById('new-cat-input').value = '';
  expandedConfigCat = name;
  renderConfig();
  renderCatChips();
}

// ADD SUBCATEGORY
function addSub(cat) {
  const inputId = 'sub-input-' + encodeURIComponent(cat);
  const el = document.getElementById(inputId);
  if (!el) return;
  const sub = el.value.trim();
  if (!sub || categories[cat].includes(sub)) return;
  categories[cat].push(sub);
  save('fm_categories', categories);
  renderConfig();
  renderSubChips();
}

// DELETE MODALS
function openDeleteCat(cat) {
  pendingDelete = { type: 'cat', cat };
  document.getElementById('modal-delete-msg').textContent = `Excluir a categoria "${cat}"? Lançamentos existentes não serão apagados.`;
  document.getElementById('modal-delete').style.display = 'flex';
}

function openDeleteSub(cat, sub) {
  pendingDelete = { type: 'sub', cat, sub };
  document.getElementById('modal-delete-msg').textContent = `Excluir a subcategoria "${sub}"?`;
  document.getElementById('modal-delete').style.display = 'flex';
}

function closeDeleteModal() {
  pendingDelete = null;
  document.getElementById('modal-delete').style.display = 'none';
}

function confirmDelete() {
  if (!pendingDelete) return;
  if (pendingDelete.type === 'cat') {
    delete categories[pendingDelete.cat];
    if (expandedConfigCat === pendingDelete.cat) expandedConfigCat = null;
    if (selectedCat === pendingDelete.cat) {
      selectedCat = Object.keys(categories)[0] || '';
      selectedSub = categories[selectedCat]?.[0] || '';
      renderCatChips(); renderSubChips();
    }
  } else {
    categories[pendingDelete.cat] = categories[pendingDelete.cat].filter(s => s !== pendingDelete.sub);
  }
  save('fm_categories', categories);
  closeDeleteModal();
  renderConfig();
}

// RENAME MODALS
function openRenameCat(cat) {
  pendingRename = { type: 'cat', cat };
  document.getElementById('modal-rename-title').textContent = 'Renomear categoria';
  document.getElementById('modal-rename-input').value = cat;
  document.getElementById('modal-rename').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-rename-input').focus(), 100);
}

function openRenameSub(cat, sub) {
  pendingRename = { type: 'sub', cat, sub };
  document.getElementById('modal-rename-title').textContent = 'Renomear subcategoria';
  document.getElementById('modal-rename-input').value = sub;
  document.getElementById('modal-rename').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-rename-input').focus(), 100);
}

function closeRenameModal() {
  pendingRename = null;
  document.getElementById('modal-rename').style.display = 'none';
}

function saveRename() {
  if (!pendingRename) return;
  const newName = document.getElementById('modal-rename-input').value.trim();
  if (!newName) { closeRenameModal(); return; }
  if (pendingRename.type === 'cat') {
    if (newName !== pendingRename.cat) {
      const updated = {};
      for (const [k,v] of Object.entries(categories)) updated[k===pendingRename.cat?newName:k] = v;
      categories = updated;
      entries = entries.map(e => e.category===pendingRename.cat ? {...e, category: newName} : e);
      if (selectedCat === pendingRename.cat) selectedCat = newName;
      save('fm_entries', entries);
      save('fm_categories', categories);
      renderCatChips();
    }
  } else {
    if (newName !== pendingRename.sub) {
      categories[pendingRename.cat] = categories[pendingRename.cat].map(s => s===pendingRename.sub?newName:s);
      entries = entries.map(e => e.category===pendingRename.cat && e.subcategory===pendingRename.sub ? {...e, subcategory: newName} : e);
      if (selectedSub === pendingRename.sub && selectedCat === pendingRename.cat) selectedSub = newName;
      save('fm_entries', entries);
      save('fm_categories', categories);
      renderSubChips();
    }
  }
  closeRenameModal();
  renderConfig();
}

// EXPORT CSV
function exportCSV() {
  if (entries.length === 0) return;
  const header = "Data,Tipo,Categoria,Subcategoria,Valor,Obs";
  const rows = [...entries].sort((a,b)=>a.date.localeCompare(b.date)).map(e => [
    e.date,
    e.type==='entrada'?'Entrada':'Saída',
    `"${e.category}"`,
    `"${e.subcategory}"`,
    e.value.toFixed(2).replace('.',','),
    `"${(e.note||'').replace(/"/g,"'")}"`
  ].join(','));
  const csv = [header,...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `financeiro_manuel_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function updateExportBtn() {
  const b = document.getElementById('export-btn');
  if (b) b.textContent = `⬇ Exportar CSV (${entries.length} lançamentos)`;
}

init();
</script>


</body></html>
